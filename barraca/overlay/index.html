<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barraca da Feira — OBS Overlay</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Rye&display=swap" rel="stylesheet">
<style>
  /* OBS Browser Source: transparent background, no scroll, fixed dimensions friendly.
     Recommended OBS size: 480x720 or 600x900 (vertical sidebar). */
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:transparent;color:#f5e9c8;font-family:'Bebas Neue',sans-serif;width:100vw;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
  .root{padding:24px 20px;display:flex;flex-direction:column;gap:16px;height:100vh}
  /* All cards share a "torn poster" look */
  .card{background:linear-gradient(180deg,rgba(245,233,200,.96) 0%,rgba(230,210,160,.94) 100%);color:#2a1c10;border:4px double #3a2616;border-radius:6px;padding:14px 18px;box-shadow:0 8px 24px rgba(0,0,0,.6);position:relative}
  .card::before{content:'';position:absolute;inset:3px;border:1px solid rgba(58,38,22,.3);border-radius:3px;pointer-events:none}
  .card h3{font-family:'Rye',serif;font-size:18px;color:#a8231d;text-align:center;border-bottom:2px solid #3a2616;padding-bottom:6px;margin-bottom:10px;letter-spacing:1px}
  /* Champion */
  .champion{text-align:center;padding-bottom:18px}
  .champion .crown{font-size:32px;margin-bottom:2px}
  .champion .name{font-family:'Rye',serif;font-size:30px;color:#1b2a4e;line-height:1;margin:4px 0}
  .champion .score{font-family:'Anton',sans-serif;font-size:42px;color:#a8231d;line-height:1}
  .champion .score small{font-size:.3em;display:block;color:#3a2616;font-family:'Bebas Neue',sans-serif;letter-spacing:3px;margin-top:4px}
  .empty{text-align:center;padding:14px 0;color:#3a2616;opacity:.6;font-style:italic;font-family:serif;font-size:13px}
  /* Top 5 */
  .top5 ol{list-style:none}
  .top5 li{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:8px;padding:5px 4px;font-family:'Bebas Neue',sans-serif;font-size:15px;color:#2a1c10;border-bottom:1px dashed rgba(58,38,22,.25);letter-spacing:1px}
  .top5 li:last-child{border-bottom:none}
  .top5 .pos{font-family:'Rye',serif;font-size:14px;color:#a8231d;text-align:center}
  .top5 .pos.p1{color:#c9a24b;text-shadow:1px 1px 0 #3a2616}
  .top5 .pos.p2{color:#8a8a92}
  .top5 .pos.p3{color:#cd7f32}
  .top5 .name{font-weight:700}
  .top5 .score{font-family:'Anton',sans-serif;color:#1b2a4e;font-size:18px}
  /* House record */
  .record{background:linear-gradient(180deg,rgba(27,42,78,.96) 0%,rgba(12,20,40,.94) 100%);color:#f5e9c8;text-align:center;padding:14px 18px 16px}
  .record::before{border-color:rgba(245,233,200,.2)}
  .record h3{color:#e9c66e;border-bottom-color:rgba(201,162,75,.3)}
  .record .trophy{font-size:24px;margin-bottom:2px}
  .record .name{font-family:'Rye',serif;font-size:22px;color:#e9c66e;margin:2px 0}
  .record .score{font-family:'Anton',sans-serif;font-size:32px;color:#f5e9c8;line-height:1}
  .record .date{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(245,233,200,.6);margin-top:4px;letter-spacing:2px}
  /* Pulse animation when score changes */
  @keyframes pulse-score{0%{transform:scale(1)}50%{transform:scale(1.15);color:#a8231d}100%{transform:scale(1)}}
  .pulse{animation:pulse-score .8s ease}
</style>
</head>
<body>
  <div class="root">

    <div class="card champion-card">
      <h3>👑 CAMPEÃO DA FESTA</h3>
      <div id="champion" class="champion">
        <div class="empty">A festa ainda não começou.</div>
      </div>
    </div>

    <div class="card top5">
      <h3>🎯 TOP 10</h3>
      <ol id="top5">
        <li class="empty" style="display:block;text-align:center">—</li>
      </ol>
    </div>

    <div class="card record">
      <h3>🏆 RECORD DA BARRACA</h3>
      <div id="record">
        <div class="empty" style="color:rgba(245,233,200,.6)">Sem record.</div>
      </div>
    </div>

  </div>

  <script>
    const POLL_MS = 3000;
    let lastScores = new Map();  // for pulse animation

    function esc(s){return (s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function fmtDate(iso){if(!iso)return '—';try{return new Date(iso).toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric'})}catch{return iso}}

    function render(state){
      const players = state?.current?.players || [];
      const champion = players[0] || null;

      // Champion
      const champEl = document.getElementById('champion');
      if (champion) {
        champEl.innerHTML = `
          <div class="crown">👑</div>
          <div class="name">${esc(champion.name)}</div>
          <div class="score">${champion.score}<small>PONTOS</small></div>
        `;
      } else {
        champEl.innerHTML = '<div class="empty">À espera de campeão…</div>';
      }

      // Top 10
      const top5El = document.getElementById('top5');
      if (players.length) {
        top5El.innerHTML = players.slice(0, 10).map((p, i) => {
          const cls = i === 0 ? 'p1' : i === 1 ? 'p2' : i === 2 ? 'p3' : '';
          const prevScore = lastScores.get(p.name);
          const pulseClass = prevScore != null && prevScore !== p.score ? ' pulse' : '';
          return `<li>
            <span class="pos ${cls}">${i+1}</span>
            <span class="name">${esc(p.name)}</span>
            <span class="score${pulseClass}">${p.score}</span>
          </li>`;
        }).join('');
      } else {
        top5El.innerHTML = '<li class="empty" style="display:block;text-align:center">—</li>';
      }

      // Refresh memo
      lastScores = new Map(players.map(p => [p.name, p.score]));

      // Record
      const recEl = document.getElementById('record');
      if (state?.record) {
        recEl.innerHTML = `
          <div class="trophy">🏆</div>
          <div class="name">${esc(state.record.name)}</div>
          <div class="score">${state.record.score}</div>
          <div class="date">${fmtDate(state.record.date)}</div>
        `;
      } else {
        recEl.innerHTML = '<div class="empty" style="color:rgba(245,233,200,.6)">Sem record.</div>';
      }
    }

    async function poll(){
      try {
        const r = await fetch('/api/barraca/state', { cache:'no-store' });
        if (r.ok) {
          const state = await r.json();
          render(state);
        }
      } catch (e) {
        // OBS overlay should never show errors — silent fail
      } finally {
        setTimeout(poll, POLL_MS);
      }
    }
    poll();
  </script>
</body>
</html>
